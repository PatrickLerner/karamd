name: Release

# Build binaries on a version tag and attach them to a GitHub Release, so the
# Nix package (and anyone else) can download a prebuilt binary instead of
# compiling from source. Linux targets are static musl (run anywhere, no glibc
# patching needed under Nix).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Create the Release first; a tag push alone does not create one, and the
  # matrix jobs below would otherwise race against a missing release.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "karamd $GITHUB_REF_NAME" --generate-notes

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: karamd
          target: ${{ matrix.target }}
          # Asset name the flake fetches: karamd-<target>.tar.gz
          archive: karamd-$target
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}

  # Prebuilt SPA bundle attached to the Release; the Nix `karamd-web-bundle`
  # fetches this instead of running `bun install` in a fixed-output derivation.
  # Asset name the flake fetches: karamd-web-dist.tar.gz
  web-bundle:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build SPA bundle
        run: bun install --frozen-lockfile && bun run build
        working-directory: web
      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar -czf karamd-web-dist.tar.gz -C web/dist .
          gh release upload "$GITHUB_REF_NAME" karamd-web-dist.tar.gz --clobber
