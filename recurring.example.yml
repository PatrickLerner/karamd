# karamd recurring-task rules. Copy to <vault>/.taskmd.recurring.yaml (the
# default --config location) and edit. Each entry materialises taskmd tasks
# when due.

# Interval-from-completion: the next task appears ~18 days AFTER you finish the
# previous one, not on a fixed calendar. Self-healing if a run is missed.
- key: periodic-checkin
  title: "Reach out to [[Someone]]"
  trigger: after_completion
  every_days: 18
  phase: next
  priority: medium
  tags: [personal]

# Fixed annual date: the task appears `lead_days` before the date, once per
# year, so there is time to prepare (e.g. buy a present, write a message).
- key: annual-birthday
  title: "Birthday: present & congratulations"
  trigger: calendar
  annual: "07-20"
  lead_days: 10
  priority: high
  tags: [personal]

# Fixed day of every month: the task appears `lead_days` before `day_of_month`,
# once per month (dedup marker key:YYYY-MM). Days 29-31 clamp to the month's
# last day, so 31 still fires in February. lead_days must be 0-27.
- key: monthly-topup
  title: "Top up account"
  trigger: monthly
  day_of_month: 12
  lead_days: 7
  priority: medium
  tags: [finance]

# Fixed weekday, once per ISO week (dedup marker key:YYYY-Www). The task lands
# on `day_of_week` (mon|tue|wed|thu|fri|sat|sun); a run later in the same week
# still catches up (Sat/Sun fire a missed Friday), but a fully missed week is
# not backfilled. An open task for the key blocks a second one, so you always
# have exactly one, never two.
- key: linkedin-weekly
  title: "Evaluate and schedule LinkedIn posts"
  trigger: weekly
  day_of_week: fri
  priority: medium
  tags: [marketing]

# Nth (or last) weekday of the month, once per month (dedup marker key:YYYY-MM).
# `week` is 1-4 or `last`. Due on or after that date; a later run in the month
# catches up. Like weekly, an open task for the key blocks a second.
- key: ops-review
  title: "Monthly ops review"
  trigger: nth_weekday
  day_of_week: mon
  week: 1            # first Monday; use `last` for e.g. the last Friday
  priority: medium
  tags: [ops]

# Interval: run only every Nth period. `weekly`, `monthly`, and `nth_weekday`
# accept `interval` (>= 1, default 1 = every period) and an optional `anchor`
# (a YYYY-MM-DD date on the desired cadence). Here: a retro every 2nd ISO week
# aligned to the Friday 2026-07-10. Omit `anchor` to align to a fixed epoch.
- key: sprint-retro
  title: "Sprint retro"
  trigger: weekly
  day_of_week: fri
  interval: 2
  anchor: 2026-07-10
  priority: medium
  tags: [team]

# Optional `body`: markdown for the generated task, replacing the default
# `## Objective / ## Tasks / ## Acceptance Criteria` TODO stub. Omit it to keep
# the stub. karamd still writes the frontmatter, the `# <title>` heading, and a
# provenance comment; `body` is everything after that. Use a `|` block scalar.
# Do not start a body with a `---` fence: it reads as a second frontmatter block
# to taskmd/Obsidian (karamd's own dedup is unaffected, its marker is up top).
- key: quarterly-backup
  title: "Verify backups restore cleanly"
  trigger: after_completion
  every_days: 90
  priority: high
  tags: [ops]
  body: |
    ## Objective

    Confirm the offsite backup actually restores, not just that it runs.

    ## Tasks

    - [ ] Pull the latest snapshot
    - [ ] Restore to a scratch host
    - [ ] Spot-check a known record

    ## Acceptance Criteria

    - A restored copy opens and the spot-checked record matches
